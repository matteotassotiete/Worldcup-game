{% extends "base.html" %}
{% block title %}Login — World Cup Game{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-hero">
    <span class="ball">⚽</span>
    <h1>World Cup 2026 Game</h1>
    <p class="auth-tagline">Play with friends · Predict scores · Compete for glory</p>
    <p class="auth-sub">Log in to your team</p>
  </div>
  <form method="post">
    <label>Team Name
      <input type="text" name="team_name" autocomplete="username" autofocus required>
    </label>
    <label>PIN
      <input type="password" name="pin" inputmode="numeric" pattern="\d{4}" maxlength="4" placeholder="4 digits" required>
    </label>
    <button type="submit" class="btn-primary">Log In →</button>
  </form>
  <p class="auth-switch">No account? <a href="{{ url_for('signup') }}">Sign up free</a></p>
</div>
{% endblock %}
