<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}WC 2026 Predictor{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
{% if session.user_id %}
<nav>
  <a href="{{ url_for('predict') }}" class="nav-brand">⚽ WC 2026</a>
  <div class="nav-links">
    <a href="{{ url_for('predict') }}" {% if request.endpoint=='predict' %}class="active"{% endif %}>Predict</a>
    <a href="{{ url_for('leaderboard') }}" {% if request.endpoint=='leaderboard' %}class="active"{% endif %}>Standings</a>
    <a href="{{ url_for('group') }}" {% if request.endpoint=='group' %}class="active"{% endif %}>Groups</a>
    <a href="{{ url_for('picks') }}" {% if request.endpoint=='picks' %}class="active"{% endif %}>Picks</a>
    <a href="{{ url_for('logout') }}" class="logout">{{ session.team_name }}</a>
  </div>
</nav>
{% endif %}
<main>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
